[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
remappings = ["forge-std/=lib/forge-std/src/"]
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
# Allow tests to read repo files (e.g. cached source, env-driven config).
fs_permissions = [{ access = "read", path = "./" }]
# Verbose traces by default so PoCs read like an exploit narrative.
verbosity = 3

# Forking needs an *archive* RPC to read historical block state.
# Fill these in .env (see .env.example); forge expands ${VAR} at load time.
[rpc_endpoints]
mainnet   = "${MAINNET_RPC_URL}"
sepolia   = "${SEPOLIA_RPC_URL}"
arbitrum  = "${ARBITRUM_RPC_URL}"
optimism  = "${OPTIMISM_RPC_URL}"
base      = "${BASE_RPC_URL}"
polygon   = "${POLYGON_RPC_URL}"
bsc       = "${BSC_RPC_URL}"
avalanche = "${AVALANCHE_RPC_URL}"

# Etherscan V2: a single API key works across every supported chain.
# Used by `forge` / `cast` to fetch verified source & ABIs for decoding.
[etherscan]
mainnet   = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
sepolia   = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
arbitrum  = { key = "${ETHERSCAN_API_KEY}", chain = 42161 }
optimism  = { key = "${ETHERSCAN_API_KEY}", chain = 10 }
base      = { key = "${ETHERSCAN_API_KEY}", chain = 8453 }
polygon   = { key = "${ETHERSCAN_API_KEY}", chain = 137 }
bsc       = { key = "${ETHERSCAN_API_KEY}", chain = 56 }
avalanche = { key = "${ETHERSCAN_API_KEY}", chain = 43114 }
